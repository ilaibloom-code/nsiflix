<!DOCTYPE html>
<!-- [JULES] DOCTYPE : dit au navigateur que c'est du HTML5 (moderne).
     Sans ça, certains navigateurs utilisent un ancien mode de rendu. -->
<html lang="fr">
<!-- [JULES] lang="fr" : indique la langue de la page (accessibilité + référencement). -->

<head>
    <meta charset="UTF-8">
    <!-- [JULES] charset UTF-8 : permet d'afficher les caractères accentués (é, à, ç).
         Côté serveur Python, on retrouve le même principe avec encoding="utf-8" dans open(). -->

    <title>NSIfilix</title>

    <!-- [JULES] Le CSS est dans un fichier séparé (style.css).
         Flask sert les fichiers statiques (CSS, JS, images) depuis le dossier static/.
         Le chemin correct est donc : /static/style.css -->
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <div class="container">

        <h1 class="rouge">NSI<span>FLIX</span></h1>

<div class="video-container">
  <iframe
    src="https://www.youtube.com/embed/nswziSVbmsY"
    title="YouTube video player"
    frameborder="0"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
    allowfullscreen>
  </iframe>
</div>
        <div class="vote-card">

            <!-- [JULES + ILAÏ] <form> : envoie les données vers le serveur Flask.
                 - action="/voter" : la route Python qui reçoit le formulaire (= URL de destination).
                 - method="POST" : envoie les données de façon invisible (pas dans l'URL).
                   Différence : GET = afficher une page / POST = envoyer des données.
                 Si on utilisait GET, on verrait "?note=5&prenom=Jules" dans l'URL. -->
            <form action="/voter" method="POST">
                <h3>Note l'épisode :</h3>

                <div id="stars">
                    <!-- [JULES + ILAÏ] Chaque étoile est un <span> avec onclick="regler(X)".
                         onclick est un événement JavaScript : il appelle la fonction regler()
                         en lui passant la valeur (1 à 5) quand on clique.
                         C'est JavaScript qui s'occupe de la logique visuelle (coloration des étoiles).

                         [ILAÏ] data-n="X" : attribut personnalisé pour stocker le numéro de l'étoile
                         directement dans la balise HTML.
                         Le "data-" au début est une convention HTML5 : ça veut dire
                         "c'est une donnée custom, pas un attribut officiel".
                         Après le tiret on met ce qu'on veut — ici "n" pour numéro.

                         Pour le clic, data-n est inutile : onclick="regler(1)" passe déjà la valeur.
                         Mais pour le survol (mouseenter dans script.js), JS ajoute les écouteurs
                         en boucle sur toutes les étoiles et n'a plus accès au 1, 2, 3...
                         Il lit alors s.dataset.n pour savoir sur quelle étoile la souris est entrée.
                         Sans data-n, le survol ne fonctionnerait pas. -->
                    <span class="etoile" data-n="1" onclick="regler(1)">★</span>
                    <span class="etoile" data-n="2" onclick="regler(2)">★</span>
                    <span class="etoile" data-n="3" onclick="regler(3)">★</span>
                    <span class="etoile" data-n="4" onclick="regler(4)">★</span>
                    <span class="etoile" data-n="5" onclick="regler(5)">★</span>
                </div>

                <!-- [ILAÏ] type="hidden" : champ INVISIBLE pour l'utilisateur.
                     Il sert de "mémoire" : JavaScript y stocke la note choisie (via regler()),
                     et le formulaire l'envoie ensuite au serveur Python avec les autres champs.
                     Sans ce champ, le serveur ne recevrait pas la note. -->
                <input type="hidden" name="note" id="la_note" value="5">

                <!-- [JULES] Champ texte pour le prénom.
                     name="prenom" : le nom sous lequel Python récupère cette valeur avec request.form["prenom"].
                     required : le navigateur bloque l'envoi si le champ est vide. -->
                <input type="text" name="prenom" placeholder="Ton prénom" required>

                <!-- [JULES] Textarea pour le commentaire libre.
                     Contrairement à <input>, le textarea peut contenir plusieurs lignes. -->
                <textarea name="commentaire" placeholder="Ton commentaire..."></textarea>

                <!-- [JULES] Bouton de soumission du formulaire.
                     type="submit" déclenche l'envoi vers action="/voter". -->
                <button type="submit">PUBLIER MON VOTE</button>
            </form>
        </div>

        <!-- [ILAÏ] { data.moyenne } et { data.nb_votes } sont de la syntaxe Jinja2 :
             les doubles accolades affichent des variables Python dans le HTML.
             Flask envoie "data" via render_template("index.html", data=data).
             Le "." accède à une propriété du dictionnaire Python : data["moyenne"]. -->
        <div class="global-stats">
            <h2>Moyenne : <span class="rouge">{{ data.moyenne }}</span>/5 ({{ data.nb_votes }} votes)</h2>
        </div>

        <hr>

        <div id="liste">
            <!-- [ILAÏ] Boucle Jinja2 : {% for c in data.commentaires|reverse %}
                 - "for c in ..." : parcourt chaque commentaire de la liste (comme en Python).
                 - "|reverse" : le pipe "|" transforme la donnée. Ici il inverse la liste
                   pour afficher le commentaire le plus récent en premier.
                 - {% endfor %} est obligatoire pour indiquer la fin de la boucle à Jinja2.

                 Jinja2 est le moteur de templates intégré à Flask. Il permet de mélanger
                 Python et HTML proprement, sans mettre de logique dans le code serveur. -->
            {% for c in data.commentaires|reverse %}
            <div class="avis">
                <!-- [ILAÏ] c.nom, c.note, c.texte : le "." accède aux propriétés de l'objet c.
                     Chaque commentaire est un dictionnaire Python {"nom": ..., "texte": ..., "note": ...}.
                     Jinja2 permet d'y accéder avec la même syntaxe que Python. -->
                <strong>{{ c.nom }}</strong> — Note : {{ c.note }}/5
                <p>{{ c.texte }}</p>
            </div>
            {% endfor %}
        </div>

    </div>

    <!-- [ILAÏ] Le JS est dans un fichier séparé (script.js), placé en bas du body.
         En bas = le HTML est chargé avant que JS s'exécute.
         Si on mettait le <script> dans le <head>, JS ne trouverait pas encore les étoiles dans le DOM. -->
    <script src="/static/script.js"></script>
</body>
</html>
